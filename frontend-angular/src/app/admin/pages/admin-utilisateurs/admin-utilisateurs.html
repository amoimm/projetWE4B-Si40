<div class="admin-dashboard">
  <div class="admin-header">
    <h1>Gestion des Utilisateurs</h1>
    <p>{{ totalCount }} utilisateur(s) au total</p>
  </div>

  <!-- Messages d'erreur/succès -->
  <div *ngIf="error" class="alert-box alert-error">{{ error }}</div>
  <div *ngIf="successMessage" class="alert-box alert-success">{{ successMessage }}</div>

  <!-- Chargement -->
  <div *ngIf="loading" class="admin-loading">Chargement en cours...</div>

  <ng-container *ngIf="!loading">
    <!-- FORMULAIRE DE RECHERCHE ET FILTRES -->
    <form class="admin-toolbar">
      <div class="form-row" style="display: flex; gap: 10px; width: 100%;">
        <input
          type="text"
          class="form-control"
          [(ngModel)]="search"
          name="search"
          placeholder="Rechercher par nom, prénom ou email..."
          style="flex: 1;"
        >
        <select [(ngModel)]="rangFilter" name="rang" class="form-control" style="max-width: 200px;">
          <option value="">Tous les rôles</option>
          <option value="0">Étudiant</option>
          <option value="1">Professeur</option>
          <option value="2">Admin</option>
        </select>
        <button type="button" (click)="filtrer()" class="admin-btn primary">Filtrer</button>
        <button type="button" (click)="reinitialiser()" class="admin-btn secondary">Réinitialiser</button>
      </div>
    </form>

    <!-- TABLEAU DES UTILISATEURS -->
    <div class="dashboard-panel">
      <table class="admin-table">
        <thead>
        <tr>
          <th>#</th>
          <th>Nom & Prénom</th>
          <th>Email</th>
          <th>Rôle</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let user of utilisateurs">
          <td>{{ user.id_utilisateurs }}</td>
          <td><strong>{{ user.prenom }} {{ user.nom }}</strong></td>
          <td>{{ user.email }}</td>
          <td style="display: flex; gap: 5px; align-items: center;">
            <select
              [(ngModel)]="selectedRangs[user.id_utilisateurs]"
              class="rang-select"
            >
              <option value="0">Étudiant</option>
              <option value="1">Professeur</option>
              <option value="2">Admin</option>
            </select>
            <button
              type="button"
              (click)="modifierRang(user.id_utilisateurs)"
              class="admin-btn primary"
            >
              OK
            </button>
          </td>
          <td>
            <button
              type="button"
              (click)="supprimerUtilisateur(user.id_utilisateurs)"
              class="admin-btn danger"
            >
              Supprimer
            </button>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <!-- PAGINATION -->
    <div class="pagination" *ngIf="totalPages > 1">
      <button
        [disabled]="currentPage === 1"
        (click)="allerPage(currentPage - 1)"
        class="admin-btn primary"
      >
        ← Précédent
      </button>

      <span class="page-info">
        Page {{ currentPage }} / {{ totalPages }}
      </span>

      <button
        [disabled]="currentPage === totalPages"
        (click)="allerPage(currentPage + 1)"
        class="admin-btn primary"
      >
        Suivant →
      </button>
    </div>
  </ng-container>
</div>
