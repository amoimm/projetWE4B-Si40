<div class="dashboard">
  <div class="dashboard-header">
    <h1>Modération des Cours</h1>
    <p>Gérez les cours disponibles sur la plateforme</p>
  </div>

  <!-- Messages d'erreur/succès -->
  <div *ngIf="error" class="alert alert-error">{{ error }}</div>
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

  <!-- Chargement -->
  <div *ngIf="loading" class="loading">Chargement en cours...</div>

  <ng-container *ngIf="!loading">
    <!-- FORMULAIRE DE RECHERCHE -->
    <form class="admin-toolbar">
      <div class="form-row">
        <input
          type="text"
          [(ngModel)]="search"
          name="search"
          placeholder="Rechercher par matière, professeur ou description..."
        >
        <button type="button" (click)="chercher()" class="action-btn primary">Chercher</button>
        <button type="button" (click)="reinitialiser()" class="action-btn">Réinitialiser</button>
      </div>
    </form>

    <!-- TABLEAU DES COURS -->
    <div class="dashboard-panel">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Matière</th>
            <th>Enseignant</th>
            <th>Tarif</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of cours">
            <td><strong>{{ c.nom_matiere }}</strong></td>
            <td>{{ c.prenom }} {{ c.nom }}</td>
            <td>{{ c.prix_heure }} €/h</td>
            <td>
              <button
                type="button"
                (click)="supprimerCours(c.id_cours)"
                class="btn-sm danger"
              >
                🗑 Supprimer
              </button>
            </td>
          </tr>
          <tr *ngIf="cours.length === 0">
            <td colspan="4" style="text-align: center; color: #7f8c8d;">
              Aucun cours trouvé
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </ng-container>
</div>
