<main>
    <div class="form-container">
        <form (submit)="onSubmit()">
            <div class="form-group">
                <label for="matiere">Matière</label>
                <select [(ngModel)]="cours.matiere" name="matiere" required>
                    <option *ngFor="let m of matieres" [value]="m.id_matiere">{{ m.nom }}</option>
                </select>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" [(ngModel)]="cours.suivi" name="suivi">
                    <span>Je propose un suivi personnalisé</span>
                </label>
            </div>

            <div class="form-group">
                <label for="description">Description du cours</label>
                <textarea [(ngModel)]="cours.description" name="description" required minlength="20"></textarea>
            </div>

            <button type="submit" class="btn-submit">Créer le cours</button>
            <a routerLink="/enseignant/mes-cours" class="btn-cancel">Annuler</a>
        </form>
    </div>
</main>
