<main class="chat-page">
  <div class="chat-card">
    <header class="chat-header">
      <h2>{{ infoCours?.description || 'Chargement du cours...' }}</h2>
    </header>

    <div class="chat-messages" #scrollMe>
      <div *ngIf="messages.length === 0" class="empty-messages">Aucun message pour le moment.</div>

      <div *ngFor="let msg of messages" class="message-row"
           [class.sent]="msg.id_redacteur === monProfil?.id"
           [class.received]="msg.id_redacteur !== monProfil?.id">
        <div class="bubble">
          <span class="text">{{ msg.contenu }}</span>
          <span class="time">{{ msg.heure | date:'HH:mm' }}</span>
        </div>
      </div>
    </div>

    <div class="rdv-block" *ngIf="rdvs.length > 0">
      <div class="rdv-item-vertical" *ngFor="let rdv of rdvs">

        <div class="rdv-details">
          <p>Date : {{ rdv.date_heure }} - Lieu : {{ rdv.lieu }}</p>
          <p>Statut :
            <span [class.valide]="rdv.est_valide == 1" [class.attente]="rdv.est_valide == 0">
          {{ rdv.est_valide == 0 ? 'En attente' : 'Confirmé' }}
        </span>
          </p>
        </div>

        <button class="btn-annuler-red" (click)="annulerRdv(rdv.id_rdv)">
          ❌ Annuler
        </button>

      </div>
    </div>

    <form class="chat-input-bar" (submit)="envoyerMessage()">
      <button type="button" class="btn-rdv-open" (click)="ouvrirModale()">+</button>
      <input type="text" [(ngModel)]="nouveauMessage" name="msg" placeholder="Écrivez votre message..." required>
      <button type="submit">Envoyer</button>
    </form>
  </div>
</main>

<div class="modal-overlay" *ngIf="modaleOuverte">
  <div class="modal-content">
    <span class="close-btn" (click)="fermerModale()">&times;</span>

    <h2 style="margin-top: 0; font-size: 1.5rem;">Demander un cours</h2>

    <form (ngSubmit)="soumettreRdv()" class="modal-form">
      <label>Date :</label>
      <input type="date" [(ngModel)]="formRdv.date_cours" name="date" [min]="dateMin" required>

      <label>Heure :</label>
      <input type="time" [(ngModel)]="formRdv.heure_cours" name="heure" required>

      <label>Durée :</label>
      <select [(ngModel)]="formRdv.duree_cours" name="duree" required>
        <option value="30 min">30 min</option>
        <option value="1h">1h</option>
      </select>

      <label>Lieu :</label>
      <input type="text" [(ngModel)]="formRdv.lieu" name="lieu" required>

      <label>Langue :</label>
      <select [(ngModel)]="formRdv.langue_cours" name="langue" required>
        <option *ngFor="let lang of languesProf" [value]="lang.nom">{{ lang.nom }}</option>
      </select>

      <button type="submit" class="btn-submit-rdv">Envoyer la demande</button>
    </form>
  </div>
</div>
