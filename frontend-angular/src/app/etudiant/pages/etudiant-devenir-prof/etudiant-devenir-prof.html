<main>
  <div style="text-align: center; margin-bottom: 2rem;">
    <h1 class="page-title">Devenir Professeur</h1>
    <p class="text-muted">Complétez votre profil pour commencer à enseigner sur la plateforme.</p>
  </div>

  <div class="form-container">
    <div class="form-group">
      <label>Matières enseignées <span style="color: #3b82f6; background-color: #eff6ff; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; margin-left: 10px;">Compétences</span></label>
      <div class="tags-grid">
        <span
          *ngFor="let m of listeMatieres"
          class="tag-item"
          [class.selected]="matieresSelectionnees.has(m.nom)"
          (click)="toggleMatiere(m.nom)">
          {{ m.nom }}
        </span>
      </div>
    </div>

    <div class="form-group" style="margin-top: 30px;">
      <label>Langues parlées <span style="color: #3b82f6; background-color: #eff6ff; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; margin-left: 10px;">Communication</span></label>
      <div class="tags-grid">
        <span
          *ngFor="let l of listeLangues"
          class="tag-item"
          [class.selected]="languesSelectionnees.has(l.nom)"
          (click)="toggleLangue(l.nom)">
          {{ l.nom }}
        </span>
      </div>
    </div>

    <div class="form-group" style="margin-top: 30px;">
      <label>Certifications <span style="color: #3b82f6; background-color: #eff6ff; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; margin-left: 10px;">Preuves en PDF</span></label>
      <div style="margin-top: 15px;">
        <input type="file" (change)="onFichiersSelectionnes($event)" accept="application/pdf" multiple class="form-control" style="padding: 10px; border: 1px dashed #3b82f6; background-color: #f8fafc;" required>

        <p *ngIf="fichiersCertif.length > 0" class="alert-box alert-success" style="margin-top: 15px;">
          ✅ {{ fichiersCertif.length }} fichier(s) prêt(s) à être envoyé(s).
        </p>
      </div>
    </div>

    <button class="btn btn-primary" style="width: 100%; margin-top: 20px; padding: 15px; font-size: 1.1rem;" (click)="soumettreFormulaire()">
      VALIDER MON PROFIL ENSEIGNANT
    </button>
  </div>
</main>
