<div class="auth-container">
  <div class="auth-card">
    <h1>Reinitialisation</h1>

    <form (ngSubmit)="envoyerDemande()">
      <div class="auth-field">
        <label class="auth-label" for="email">Adresse mail</label>
        <input class="auth-input" type="email" id="email" name="email" [(ngModel)]="email" placeholder="mon.email@example.com" required [disabled]="enCours" />
      </div>

      <div class="auth-field">
        <label class="auth-label" for="nouveauMdp">Nouveau mot de passe</label>
        <input class="auth-input" type="password" id="nouveauMdp" name="nouveauMdp" [(ngModel)]="nouveauMdp" placeholder="••••••••" required [disabled]="enCours" />
      </div>

      <div class="auth-field">
        <label class="auth-label" for="confirmeMdp">Confirmer le mot de passe</label>
        <input class="auth-input" type="password" id="confirmeMdp" name="confirmeMdp" [(ngModel)]="confirmeMdp" placeholder="••••••••" required [disabled]="enCours" />
      </div>

      <div *ngIf="messageErreur" class="alert-box alert-error">
        {{ messageErreur }}
      </div>
      <div *ngIf="messageSucces" class="alert-box alert-success">
        {{ messageSucces }}
      </div>

      <div class="auth-sep"></div>

      <button type="submit" class="auth-btn" [disabled]="enCours">
        {{ enCours ? 'Mise à jour...' : 'Réinitialiser le mot de passe' }}
      </button>
    </form>

    <p class="auth-footer-text">
      <a routerLink="/auth/connexion">Retour à la connexion</a>
    </p>
  </div>

  <footer>
    <span>© 2026 CoursConnect — Site de réservation de cours</span>
    <span class="sep">·</span>
    <span>Mentions légales & CGU</span>
    <span class="sep">·</span>
    <span>Protection des données</span>
  </footer>
</div>
